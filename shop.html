<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Robins Luxe Threads</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar__logo"></a>
      <ul class="navbar__links" id="navLinks"></ul>
      <div class="navbar__toggle" id="navToggle" onclick="toggleNav()">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <div class="page-banner">
    <h1 class="page-banner__title" id="shopTitle"></h1>
  </div>

  <section class="section">
    <div class="container">
      <div class="shop-layout">
        <aside class="shop-sidebar">
          <div class="filter-group">
            <h3 class="filter-group__title" onclick="toggleFilter(this)">Search <span class="filter-arrow">▼</span></h3>
            <div class="filter-group__body">
              <input type="text" id="searchFilter" placeholder="Search products..." oninput="filterProducts()" style="width:100%;padding:12px 14px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);">
            </div>
          </div>
          <div class="filter-group">
            <h3 class="filter-group__title" onclick="toggleFilter(this)">Category <span class="filter-arrow">▼</span></h3>
            <div class="filter-group__body" id="categoryFilters"></div>
          </div>
          <div class="filter-group">
            <h3 class="filter-group__title" onclick="toggleFilter(this)">Price Range <span class="filter-arrow">▼</span></h3>
            <div class="filter-group__body">
              <select id="priceFilter" onchange="filterProducts()"></select>
            </div>
          </div>
          <div class="filter-group">
            <h3 class="filter-group__title" onclick="toggleFilter(this)">Size <span class="filter-arrow">▼</span></h3>
            <div class="filter-group__body" id="sizeFilters"></div>
          </div>
          <button class="btn btn--outline btn--small btn--full" onclick="clearFilters()">Clear Filters</button>
        </aside>

        <div>
          <div class="shop-header">
            <span class="shop-header__count" id="productCount"></span>
            <div class="shop-header__sort">
              <select id="sortFilter" onchange="filterProducts()"></select>
            </div>
          </div>
          <div class="products-grid" id="shopProducts"></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer__grid">
        <div>
          <a href="index.html" class="navbar__logo"></a>
          <p class="footer__brand-desc"></p>
        </div>
        <div>
          <h4 class="footer__title">Quick Links</h4>
          <div class="footer__links" id="footerQuickLinks"></div>
        </div>
        <div>
          <h4 class="footer__title">Categories</h4>
          <div class="footer__links" id="footerCategories"></div>
        </div>
        <div>
          <h4 class="footer__title">Customer Care</h4>
          <div class="footer__links" id="footerCustomerCare"></div>
        </div>
      </div>
      <div class="footer__bottom"></div>
    </div>
  </footer>

  <div class="toast" id="toast"></div>
  <script src="js/main.js"></script>
  <script>
    function toggleFilter(titleEl) {
      titleEl.parentElement.classList.toggle('collapsed');
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadSiteData().then(() => {
        renderNav();

        // Page title
        document.getElementById('shopTitle').textContent = cfg('ui.shopPage.title', 'Our Collection');

        // Price range dropdown
        const priceRanges = cfg('ui.shopPage.priceRanges', []);
        const priceEl = document.getElementById('priceFilter');
        if (priceRanges.length) {
          priceEl.innerHTML = priceRanges.map(r => `<option value="${r.value}">${r.label}</option>`).join('');
        }

        // Sort dropdown
        const sortOptions = cfg('ui.shopPage.sortOptions', []);
        const sortEl = document.getElementById('sortFilter');
        if (sortOptions.length) {
          sortEl.innerHTML = sortOptions.map(s => `<option value="${s.value}">${s.label}</option>`).join('');
        }

        // Size filters from config
        const sizes = getAvailableSizes();
        const sizeEl = document.getElementById('sizeFilters');
        sizeEl.innerHTML = sizes.map(s => `<label><input type="checkbox" value="${s}" onchange="filterProducts()"> ${s}</label>`).join('');

        // Category filters
        renderShopSidebar();

        // URL category param
        const params = new URLSearchParams(window.location.search);
        const category = params.get('category');
        if (category) {
          const checkbox = document.querySelector(`#categoryFilters input[value="${category}"]`);
          if (checkbox) checkbox.checked = true;
        }

        filterProducts();
        renderFooter();
        applyBranding();
      });
    });
  </script>
</body>
</html>
